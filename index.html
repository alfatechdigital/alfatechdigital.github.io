<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Access System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-glow: rgba(0, 243, 255, 0.5);
            --dark-bg: #020617;
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Particles Background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 105;
            pointer-events: none;
        }

        /* Container Pintu */
        #door-container {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            background: #000;
        }

        .door-leaf {
            flex: 1;
            background: linear-gradient(90deg, #0f172a, #1e293b);
            position: relative;
            transition: transform 1.5s cubic-bezier(0.8, 0, 0.2, 1);
            border: 1px solid #1e293b;
            overflow: hidden;
        }

        .left-door { border-right: none; }
        .right-door { border-left: none; }

        .door-open .left-door { transform: translateX(-100%); }
        .door-open .right-door { transform: translateX(100%); }
        .door-open #particles-js { opacity: 0; transition: opacity 1s ease; }

        /* HUD Grid Overlay */
        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* Scanner Center Elements */
        .scanner-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 110;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            opacity: 0.2;
        }

        .ring-1 { width: 420px; height: 420px; border-style: dashed; animation: rotate 15s linear infinite; }
        .ring-2 { width: 480px; height: 480px; border-width: 1px; animation: rotate-reverse 20s linear infinite; }
        .ring-3 { 
            width: 550px; height: 550px; border: 1px double rgba(0, 243, 255, 0.1); 
            animation: pulse-ring 4s ease-in-out infinite;
        }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes rotate-reverse { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } }
        @keyframes pulse-ring { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.2; } }

        /* Portrait Scanning Box */
        .portrait-scan-box {
            width: 190px;
            height: 270px;
            border: 2px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.03);
            backdrop-filter: blur(8px);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 40px rgba(0, 243, 255, 0.05);
            z-index: 120;
        }

        .portrait-scan-box:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.08);
            box-shadow: inset 0 0 60px rgba(0, 243, 255, 0.15), 0 0 30px rgba(0, 243, 255, 0.1);
            transform: scale(1.02);
        }

        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid var(--neon-blue);
            transition: all 0.3s;
        }
        .top-left { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-right { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .portrait-scan-box:hover .corner { width: 35px; height: 35px; }

        .scan-here-label {
            margin-top: 25px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.4; }
        }

        .fingerprint-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: all 0.5s;
        }

        .is-scanning .fingerprint-placeholder {
            opacity: 1;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            transform: scale(1.1);
        }

        /* Scanning Laser Line */
        .laser-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            box-shadow: 0 0 20px var(--neon-blue);
            top: 0;
            left: 0;
            z-index: 5;
            display: none;
        }

        @keyframes scanMove {
            0% { top: 0%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .is-scanning .laser-line {
            display: block;
            animation: scanMove 2.5s ease-in-out infinite;
        }

        /* Side Data Decoration - Samakan Opacity */
        .side-data {
            position: absolute;
            top: 60px;
            font-size: 11px;
            color: var(--neon-blue);
            opacity: 0.7; /* Opacity disamakan */
            max-width: 220px;
            pointer-events: none;
            line-height: 1.8;
        }
        .left-data { left: 50px; text-align: left; }
        .right-data { right: 50px; text-align: right; }

        .data-glitch { animation: textGlitch 5s step-end infinite; }
        @keyframes textGlitch {
            0%, 90% { transform: translate(0); }
            91% { transform: translate(2px, 1px); opacity: 0.8; }
            92% { transform: translate(-2px, -1px); opacity: 1; }
            93% { transform: translate(0); }
        }

        .status-label {
            margin-top: 3rem;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-transform: uppercase;
            background: rgba(0, 243, 255, 0.05);
            padding: 5px 15px;
            border-radius: 4px;
        }

        /* Transition Screen */
        #redirect-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Digital Circuit Decorative Elements */
        .circuit {
            position: absolute;
            width: 100px;
            height: 1px;
            background: var(--neon-blue);
            opacity: 0.2;
        }
        .c1 { top: 20%; left: 0; width: 15%; }
        .c2 { bottom: 20%; right: 0; width: 15%; }
    </style>
</head>
<body>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Redirect Overlay -->
    <div id="redirect-overlay">
        <div class="status-label data-glitch">MENGAKTIFKAN PROTOKOL PORTOFOLIO...</div>
        <div class="w-72 h-1 bg-slate-900 mt-8 overflow-hidden border border-cyan-900">
            <div class="h-full bg-cyan-400 animate-[loading_2.5s_ease-in-out_infinite]"></div>
        </div>
    </div>
    <style>
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>

    <!-- Overlay Pintu Biometrik -->
    <div id="door-container">
        <div class="hud-overlay"></div>
        <div class="circuit c1"></div>
        <div class="circuit c2"></div>
        
        <div class="door-leaf left-door">
            <div class="side-data left-data">
                <p class="data-glitch">> SYSTEM_INIT: [OK]</p>
                <p>> KERNE_MODE: SECURE</p>
                <p>> ENCRYPT: SHA-512</p>
                <p>> GATE_ID: HQ-BETA-01</p>
                <div class="mt-10 space-y-2">
                    <div class="w-full h-[2px] bg-cyan-950/50 relative overflow-hidden">
                        <div class="absolute inset-0 bg-cyan-400/40 translate-x-[-50%] animate-[slide_3s_linear_infinite]"></div>
                    </div>
                    <div class="w-2/3 h-[2px] bg-cyan-950/50"></div>
                </div>
            </div>
        </div>
        
        <div class="scanner-center">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            
            <div id="scanner-wrapper" class="relative flex flex-col items-center">
                <div class="portrait-scan-box" onclick="initiateScan()">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                    
                    <div id="laser" class="laser-line"></div>
                    
                    <div class="scan-here-label">SCAN HERE</div>
                    
                    <div class="fingerprint-placeholder">
                        
                    </div>
                </div>

                <div id="status-label" class="status-label animate-pulse">
                    [ MENUNGGU OTENTIKASI ]
                </div>
            </div>
        </div>

        <div class="door-leaf right-door">
            <div class="side-data right-data">
                <p class="data-glitch">BIOMETRIC_LINK: [ON]</p>
                <p>ACCESS: LEVEL_O5</p>
                <p>UPLINK_SPEED: 10GBPS</p>
                <p>AUTH_FAIL_COUNT: 0</p>
                <div class="mt-10 flex justify-end">
                    <div class="grid grid-cols-5 gap-1">
                        <div class="w-2 h-4 bg-cyan-400/20"></div>
                        <div class="w-2 h-4 bg-cyan-400/40"></div>
                        <div class="w-2 h-4 bg-cyan-400/60 animate-pulse"></div>
                        <div class="w-2 h-4 bg-cyan-400/20"></div>
                        <div class="w-2 h-4 bg-cyan-400/10"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
    </style>

    <script>
        // Konfigurasi Particles.js yang lebih halus
        particlesJS("particles-js", {
          "particles": {
            "number": { "value": 120, "density": { "enable": true, "value_area": 1000 } },
            "color": { "value": "#00f3ff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.4, "random": true },
            "size": { "value": 2, "random": true },
            "line_linked": { "enable": true, "distance": 130, "color": "#00f3ff", "opacity": 0.15, "width": 1 },
            "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
          },
          "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "grab" } },
            "modes": { "grab": { "distance": 180, "line_linked": { "opacity": 0.4 } } }
          },
          "retina_detect": true
        });

        let isProcessing = false;

        function initiateScan() {
            if (isProcessing) return;
            isProcessing = true;

            const status = document.getElementById('status-label');
            const wrapper = document.getElementById('scanner-wrapper');
            const doorContainer = document.getElementById('door-container');
            const redirectOverlay = document.getElementById('redirect-overlay');

            wrapper.classList.add('is-scanning');
            status.innerText = "[ MEMINDAI SIDIK JARI... ]";
            status.style.color = "#00f3ff";

            // Sequence Animasi
            setTimeout(() => {
                status.innerText = "[ DATA COCOK ]";
                status.style.color = "#22c55e";
                status.classList.remove('animate-pulse');
                
                setTimeout(() => {
                    status.innerText = "[ SELAMAT DATANG ]";
                    
                    setTimeout(() => {
                        doorContainer.classList.add('door-open');
                        
                        setTimeout(() => {
                            redirectOverlay.style.display = 'flex';
                            setTimeout(() => {
                                redirectOverlay.style.opacity = '1';
                                setTimeout(() => {
                                    window.location.href = 'porto.html';
                                }, 2000);
                            }, 50);
                        }, 1300);
                    }, 600);
                }, 900);

            }, 4000); // Durasi scan lebih lama agar terasa prosesnya
        }
    </script>
</body>
</html>
